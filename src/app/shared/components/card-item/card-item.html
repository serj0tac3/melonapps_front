<div class="relative bg-white dark:bg-slate-800 rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 border border-slate-200 dark:border-slate-700 flex flex-col overflow-hidden group cursor-pointer" 
     [routerLink]="['/card', activeVariant().unique_id]">
  
  <div class="absolute top-2 left-2 right-2 flex justify-between items-start z-10 pointer-events-none">
    
    <div class="flex gap-1">
      <div class="flex gap-1 pointer-events-auto">
        <button 
          (click)="toggleWishlist($event)"
          [disabled]="isWishlisting()"
          class="flex items-center justify-center w-8 h-8 rounded-lg bg-white/90 dark:bg-slate-900/90 text-rose-500 hover:bg-rose-500 hover:text-white dark:hover:bg-rose-500 dark:hover:text-white shadow-sm border border-slate-200 dark:border-slate-700 backdrop-blur-md transition-colors"
          title="Añadir a Wishlist">
          @if (isWishlisting()) {
            <div class="animate-spin w-4 h-4 border-2 border-current border-t-transparent rounded-full"></div>
          } @else if (activeVariant().is_wishlisted) {
            <svg class="w-4 h-4 text-rose-500" fill="currentColor" viewBox="0 0 24 24">
              <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" />
            </svg>
          } @else {
            <svg class="w-4 h-4 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
            </svg>
          }
        </button>
      </div>
    </div>

    <div class="flex flex-col items-end gap-1">
      
      @if (activeVariant().owned_copies && activeVariant().owned_copies! > 0) {
        <span class="bg-emerald-500/95 backdrop-blur-sm text-white text-xs font-bold px-2 py-1 rounded-full shadow-md border border-emerald-400 flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
          </svg>
          {{ activeVariant().owned_copies }}
        </span>
      }

    </div>
  </div>

  <div class="relative pt-[140%] bg-slate-100 dark:bg-slate-900 overflow-hidden">
    <img 
      [src]="activeVariant().image_url" 
      [alt]="activeVariant().name" 
      class="absolute top-0 left-0 w-full h-full object-cover"
    >
  </div>

  <div class="p-3 flex flex-col flex-grow">
    <h3 class="font-bold text-sm text-slate-900 dark:text-white truncate" [title]="activeVariant().name">
      {{ activeVariant().name }}
    </h3>
    <p class="text-xs text-slate-500 dark:text-slate-400 font-mono mt-0.5">
      {{ activeVariant().card_number }}
    </p>

    <div class="mt-auto pt-3 flex justify-between items-center">
      
      <div class="flex items-center gap-1 pointer-events-auto" (click)="$event.stopPropagation()">
        @if (card.variants && card.variants.length > 1) {
          @for (variant of card.variants; track variant.unique_id) {
            <button 
              (click)="selectVariant(variant); $event.preventDefault()" 
              class="w-2.5 h-2.5 rounded-full transition-all duration-200 border border-slate-300 dark:border-slate-600 shadow-sm"
              [ngClass]="activeVariant().unique_id === variant.unique_id ? 'bg-amber-400 scale-125 border-amber-500' : 'bg-slate-200 dark:bg-slate-700 hover:bg-slate-300'">
            </button>
          }
        }
      </div>

      <button 
        (click)="quickAdd($event)" 
        [disabled]="isAdding()"
        class="pointer-events-auto flex items-center justify-center w-8 h-8 rounded-lg bg-emerald-100 text-emerald-700 hover:bg-emerald-500 hover:text-white dark:bg-emerald-900/40 dark:text-emerald-400 dark:hover:bg-emerald-500 dark:hover:text-white transition-colors"
        title="Añadir Variante a Bóveda">
        @if (isAdding()) {
          <div class="animate-spin w-4 h-4 border-2 border-current border-t-transparent rounded-full"></div>
        } @else {
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
          </svg>
        }
      </button>
    </div>
  </div>
</div>
