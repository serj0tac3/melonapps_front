<div class="w-full relative z-50">
  
  <div class="flex gap-2 w-full md:w-[32rem] ml-auto">
    <div class="w-full relative" [formGroup]="filterForm">
        <div class="relative flex-grow">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
        <input
            type="text"
            formControlName="search"
            class="block w-full pl-10 pr-3 py-2 border border-slate-300 dark:border-slate-700 rounded-lg leading-5 bg-white dark:bg-slate-900 text-slate-900 dark:text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-colors shadow-sm"
            placeholder="Buscar por personaje o código..."
        >
        </div>
    </div>
    
    <button 
      (click)="toggleFilters()"
      class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 transition-colors shadow-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
      </svg>
      Filtros
    </button>
  </div>

  @if (isFiltersOpen() && activeFilters()) {
    <div class="absolute right-0 mt-3 w-full md:w-[32rem] bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl shadow-xl p-4 transition-all z-50" [formGroup]="filterForm">
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        
        <div>
          <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Color</label>
          <select formControlName="color" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500">
            <option value="">Todos</option>
            @for (color of activeFilters().colors; track color.value) {
              <option [value]="color.value">{{ color.label }}</option>
            }
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Tipo</label>
          <select formControlName="category" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500">
            <option value="">Todos</option>
            @for (category of activeFilters().categories; track category.value) {
              <option [value]="category.value">{{ category.label }}</option>
            }
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Rareza</label>
          <select formControlName="rarity" class="w-full bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-700 dark:text-slate-200 focus:ring-2 focus:ring-indigo-500">
            <option value="">Todas</option>
            @for (rarity of activeFilters().rarities; track rarity.value) {
              <option [value]="rarity.value">{{ rarity.label }}</option>
            }
          </select>
        </div>

      </div>

      <div class="mt-4 flex justify-end">
        <button (click)="resetFilters()" class="text-sm text-slate-500 hover:text-indigo-600 transition-colors">
          Limpiar filtros
        </button>
      </div>
    </div>
  }
</div>
