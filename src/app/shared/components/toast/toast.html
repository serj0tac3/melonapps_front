<div class="fixed bottom-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none">
  
  @for (toast of toastService.toasts(); track toast.id) {
    <div 
      class="pointer-events-auto flex items-start w-80 max-w-full p-4 rounded-xl shadow-2xl border backdrop-blur-md transition-all duration-300 animate-fade-in-up"
      [ngClass]="{
        'bg-emerald-50/90 dark:bg-emerald-900/80 border-emerald-200 dark:border-emerald-700': toast.type === 'success',
        'bg-rose-50/90 dark:bg-rose-900/80 border-rose-200 dark:border-rose-700': toast.type === 'error',
        'bg-indigo-50/90 dark:bg-indigo-900/80 border-indigo-200 dark:border-indigo-700': toast.type === 'info'
      }"
    >
      
      <div class="flex-shrink-0 mr-3">
        @if (toast.type === 'success') {
          <svg class="w-6 h-6 text-emerald-600 dark:text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        } @else if (toast.type === 'error') {
          <svg class="w-6 h-6 text-rose-600 dark:text-rose-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        } @else {
          <svg class="w-6 h-6 text-indigo-600 dark:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        }
      </div>

      <div class="flex-1">
        <h4 class="text-sm font-bold"
            [ngClass]="{
              'text-emerald-900 dark:text-emerald-100': toast.type === 'success',
              'text-rose-900 dark:text-rose-100': toast.type === 'error',
              'text-indigo-900 dark:text-indigo-100': toast.type === 'info'
            }">
          {{ toast.title }}
        </h4>
        <p class="text-sm mt-1"
           [ngClass]="{
             'text-emerald-700 dark:text-emerald-300': toast.type === 'success',
             'text-rose-700 dark:text-rose-300': toast.type === 'error',
             'text-indigo-700 dark:text-indigo-300': toast.type === 'info'
           }">
          {{ toast.message }}
        </p>
      </div>

      <button (click)="toastService.remove(toast.id)" class="ml-4 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>

    </div>
  }
</div>
