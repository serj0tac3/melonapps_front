<div class="bg-[#0f172a] border border-slate-800 rounded-xl p-4 md:p-6 text-slate-300 w-full max-w-md shadow-xl">
  
  <div class="flex items-center gap-2 mb-4 border-b border-slate-800 pb-2">
    @for (game of games(); track game.id) {
      <button 
        (click)="selectGame(game.id)"
        class="flex-1 flex flex-col items-center justify-center py-2 px-3 rounded-lg text-sm font-medium transition-all"
        [class]="activeGameId() === game.id ? 'bg-indigo-600/10 text-indigo-400' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/50'">
        
        <span class="mb-1 text-lg">
          @if (game.slug === 'one-piece') { ⚓ }
          @else if (game.slug === 'pokemon') { ◓ }
          @else { 🗡️ }
        </span>
        {{ game.name }}
      </button>
    }
  </div>

  <div class="relative mb-6">
    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
      <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    <input 
      type="text"
      [ngModel]="searchTerm()"
      (ngModelChange)="searchTerm.set($event)"
      placeholder="Buscar set por código o nombre..."
      class="w-full bg-[#1e293b] text-sm text-slate-200 border border-slate-700 rounded-lg pl-10 pr-4 py-3 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 placeholder-slate-500 transition-colors"
    >
  </div>

  <div class="flex flex-col gap-6 overflow-y-auto max-h-[500px] pr-2 custom-scrollbar">
    @for (group of groupedSets(); track group.familyName) {
      <div>
        <h4 class="text-xs font-semibold text-slate-500 tracking-wider mb-3 ml-1">
          {{ group.familyName }}
        </h4>
        
        <div class="flex flex-col gap-2">
          @for (set of group.sets; track set.id) {
            <button 
              (click)="selectSet(set)"
              class="w-full text-left flex items-center p-3 rounded-xl border transition-all"
              [class]="selectedSet()?.id === set.id 
                ? 'bg-[#1e1b4b]/80 border-indigo-500/50 ring-1 ring-indigo-500/50' 
                : 'bg-transparent border-transparent hover:bg-slate-800/50'">
              
              <div class="flex-shrink-0 w-16 h-12 rounded-lg bg-[#1e293b] border border-slate-700 flex items-center justify-center mr-4 overflow-hidden relative shadow-inner">
                @if (set.image_url) {
                  <img [src]="set.image_url" [alt]="set.short_name" class="w-full h-full object-contain p-1 drop-shadow-md">
                } @else {
                  <span class="text-[10px] leading-tight font-bold text-slate-400 px-1 text-center break-all">
                    {{ set.code }}
                  </span>
                }
              </div>

              <div class="flex-1 min-w-0">
                <h5 class="text-sm font-bold text-white truncate" 
                    [class.text-indigo-200]="selectedSet()?.id === set.id">
                  {{ set.short_name }}
                </h5>
                <p class="text-xs text-slate-500 mt-0.5">
                  {{ set.code }} · {{ set.total_cards }} cartas
                </p>
              </div>

              <div class="flex items-center ml-4 pl-2">
                @if (selectedSet()?.id === set.id) {
                  <svg class="h-5 w-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                  </svg>
                } @else {
                  <div class="flex items-center gap-3">
                    <div class="w-12 h-1.5 bg-slate-800 rounded-full overflow-hidden">
                      <div class="h-full bg-green-500 rounded-full" [style.width.%]="set.progress || 0"></div>
                    </div>
                    <span class="text-xs font-medium" [class]="(set.progress || 0) > 0 ? 'text-green-500' : 'text-slate-600'">
                      {{ set.progress || 0 }}%
                    </span>
                  </div>
                }
              </div>

            </button>
          }
        </div>
      </div>
    }
    
    @if (groupedSets().length === 0) {
      <div class="text-center text-slate-500 py-8 text-sm">
        No se encontraron sets para esta búsqueda.
      </div>
    }
  </div>
</div>

<style>
  /* CSS para scrollbar oscuro estilo Mac */
  .custom-scrollbar::-webkit-scrollbar { width: 6px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }
</style>
